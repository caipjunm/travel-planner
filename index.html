<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行计划生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0f0f23;color:#e8e8e8}
.app{max-width:1500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.app-header{background:linear-gradient(135deg,#e94560 0%,#c23152 40%,#0f3460 100%);padding:14px 40px;text-align:center}
.app-header h1{font-size:18px;letter-spacing:2px;margin:0}
.app-header p{font-size:11px;opacity:.7;margin-top:2px}

/* Form */
.form-panel{background:#16213e;border-bottom:1px solid rgba(255,255,255,.06);padding:12px 40px}
.form-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.form-g{display:flex;flex-direction:column;gap:4px}
.form-g label{font-size:11px;color:#667788;letter-spacing:1px}
.form-g input,.form-g select{padding:9px 14px;border-radius:8px;border:1px solid #334;background:#0f0f23;color:#e8e8e8;font-size:13px;min-width:120px;font-family:inherit}
.form-g input:focus,.form-g select:focus{outline:none;border-color:#e94560}
.btn{padding:10px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn-go{background:#e94560;color:white}
.btn-go:hover{background:#d63850}
.btn-out{background:transparent;color:#e94560;border:1px solid #e94560}
.btn-out:hover{background:rgba(233,69,96,.1)}
.status-msg{font-size:11px;color:#667;margin-left:8px}

/* Content */
.content{flex:1;display:flex;min-height:0}
.plan-panel{width:450px;min-width:450px;background:#111827;overflow-y:auto;max-height:calc(100vh - 200px);border-right:1px solid rgba(255,255,255,.06)}
.map-panel{flex:1;position:relative;min-height:400px}
#map{width:100%;height:100%}

.plan-inner{padding:16px 20px}
.plan-title{font-size:17px;font-weight:700;margin-bottom:2px}
.plan-subtitle{font-size:12px;color:#667;margin-bottom:14px}

/* Day card */
.day-card{background:#16213e;border-radius:12px;margin-bottom:14px;border:1px solid rgba(255,255,255,.05);overflow:hidden}
.day-hd{padding:10px 16px;background:rgba(255,255,255,.02);font-weight:700;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;cursor:pointer}
.day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-dot.d0{background:#e94560}.day-dot.d1{background:#5b9bd5}.day-dot.d2{background:#a080d0}.day-dot.d3{background:#50d090}.day-dot.d4{background:#f0a050}
.day-weather{font-size:10px;color:#667;margin-left:auto}

.stop-row{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-left:2px solid transparent;font-size:13px;transition:background .12s}
.stop-row:hover{background:rgba(255,255,255,.03)}
.stop-row.active{background:rgba(233,69,96,.08);border-left-color:#e94560}
.stop-num{width:22px;height:22px;min-width:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white}
.stop-num.s0{background:#e94560}.stop-num.s1{background:#5b9bd5}.stop-num.s2{background:#a080d0}.stop-num.s3{background:#50d090}.stop-num.s4{background:#f0a050}
.stop-info{flex:1;min-width:0}
.stop-info .s-name{font-size:13px;color:#dde}
.stop-info .s-note{font-size:11px;color:#667;margin-top:1px}

.seg-link{display:flex;align-items:center;gap:8px;padding:5px 16px 5px 38px;text-decoration:none;cursor:pointer;transition:background .12s}
.seg-link:hover{background:rgba(240,160,80,.08)}
.seg-mode{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.seg-mode.walk{background:#1a3a2c;color:#50d090}.seg-mode.taxi{background:#3d2a1a;color:#f0a050}
.seg-mode.metro{background:#1a2a3d;color:#5b9bd5}.seg-mode.train{background:#2a1a3d;color:#a080d0}
.seg-desc{font-size:11px;color:#889}

/* Weather summary */
.weather-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.w-chip{padding:6px 12px;border-radius:16px;font-size:11px;background:#16213e;border:1px solid rgba(255,255,255,.06)}
.w-chip .w-date{color:#667}.w-chip .w-icon{font-size:16px}.w-chip .w-desc{color:#dde;font-weight:700}

/* Budget */
.budget-bar{padding:14px 16px;font-size:12px;color:#889;line-height:2;border-top:1px solid rgba(255,255,255,.06)}

/* Legend */
.legend{position:absolute;bottom:20px;right:20px;z-index:1000;background:rgba(15,15,35,.92);border-radius:10px;padding:12px 16px;font-size:10px;border:1px solid rgba(255,255,255,.08);pointer-events:none;line-height:2}
.legend .ld{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#445;gap:12px}
.empty .eicon{font-size:48px}
.empty p{font-size:14px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:#667;font-size:13px}
.spinner{width:24px;height:24px;border:2px solid #334;border-top-color:#e94560;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#e94560;color:white;padding:10px 24px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
<div class="app-header">
  <h1>📍 旅行计划生成器</h1>
  <p>输入城市和日期，自动生成行程安排 + 路线图 + 预算估算</p>
</div>

<div class="form-panel">
<div class="form-row">
  <div class="form-g"><label>🏙 目的地</label><input id="fCity" list="cityList" placeholder="如：长沙" value="长沙"><datalist id="cityList"></datalist></div>
  <div class="form-g"><label>📅 出发日期</label><input id="fDate" type="date" value="2026-05-22"></div>
  <div class="form-g"><label>📆 天数</label><select id="fDays"><option value="1">1天</option><option value="2">2天</option><option value="3" selected>3天</option><option value="4">4天</option><option value="5">5天</option></select></div>
  <div class="form-g"><label>🎯 风格</label><select id="fStyle"><option value="moderate" selected>适中</option><option value="packed">紧凑打卡</option><option value="relaxed">悠闲慢游</option></select></div>
  <div class="form-g"><label>💰 预算</label><select id="fBudget"><option value="mid" selected>中档</option><option value="budget">经济实惠</option><option value="luxury">轻奢享受</option></select></div>
  <div class="form-g"><label>👥 人数</label><select id="fPeople"><option value="1">1人</option><option value="2" selected>2人</option><option value="3">3人</option><option value="4">4人</option></select></div>
  <button class="btn btn-go" id="btnGen" onclick="generatePlan()">✨ 生成计划</button>
</div>
</div>

<div class="content">
<div class="plan-panel" id="planPanel">
  <div class="empty" id="emptyState"><div class="eicon">🗺</div><p>设置参数后点击「生成计划」</p><p style="font-size:12px;color:#556;">目前已支持 12 个热门城市</p></div>
  <div class="loading" id="loadingState" style="display:none"><div class="spinner"></div><span id="loadingText">正在生成…</span></div>
  <div class="plan-inner" id="planContent" style="display:none"></div>
</div>
<div class="map-panel">
  <div id="map"></div>
  <div class="legend" id="legend" style="display:none">
    <div><span class="ld" style="background:#e94560"></span>Day1</div>
    <div><span class="ld" style="background:#5b9bd5"></span>Day2</div>
    <div><span class="ld" style="background:#a080d0"></span>Day3</div>
    <div><span class="ld" style="background:#50d090"></span>Day4</div>
    <div><span class="ld" style="background:#f0a050"></span>Day5</div>
    <div style="font-size:9px;color:#667;margin-top:4px;">点击路段→高德导航</div>
  </div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

// ============================================================
//  WEATHER API — Open-Meteo (free, no key, CORS enabled)
// ============================================================
var WMO_CODES = {
  0:'☀️ 晴',1:'🌤 少云',2:'⛅ 多云',3:'☁️ 阴',
  45:'🌫 雾',48:'🌫 雾凇',
  51:'🌧 小毛毛雨',53:'🌧 毛毛雨',55:'🌧 大毛毛雨',
  61:'🌧 小雨',63:'🌧 中雨',65:'🌧 大雨',
  71:'❄️ 小雪',73:'❄️ 中雪',75:'❄️ 大雪',
  80:'🌧 阵雨',81:'🌧 中阵雨',82:'🌧 大阵雨',
  95:'⛈ 雷暴',96:'⛈ 雷暴+冰雹',99:'⛈ 强雷暴+冰雹'
};

function fetchWeather(lat, lng, startDate, days) {
  var endDate = new Date(startDate);
  endDate.setDate(endDate.getDate() + days - 1);
  var sd = startDate.toISOString().split('T')[0];
  var ed = endDate.toISOString().split('T')[0];
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng
    + '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum'
    + '&start_date=' + sd + '&end_date=' + ed + '&timezone=Asia/Shanghai';
  return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    var daily = data.daily;
    var result = [];
    for (var i = 0; i < daily.time.length; i++) {
      result.push({
        date: daily.time[i],
        weatherCode: daily.weathercode[i],
        weatherDesc: WMO_CODES[daily.weathercode[i]] || '未知',
        tempMax: Math.round(daily.temperature_2m_max[i]),
        tempMin: Math.round(daily.temperature_2m_min[i]),
        precip: daily.precipitation_sum[i] || 0,
        isRainy: (daily.weathercode[i] >= 50 && daily.weathercode[i] < 90) || daily.weathercode[i] >= 95,
      });
    }
    return result;
  });
}

function generatePlan() {
  var cityName = document.getElementById('fCity').value.trim();
  var startDate = new Date(document.getElementById('fDate').value + 'T00:00:00');
  var days = parseInt(document.getElementById('fDays').value);
  var style = document.getElementById('fStyle').value;
  var budget = document.getElementById('fBudget').value;
  var people = parseInt(document.getElementById('fPeople').value);

  if (!cityName) { toast('请输入城市名称'); return; }
  if (isNaN(startDate.getTime())) { toast('请选择有效日期'); return; }

  // Find city
  var city = CITY_DB[cityName];
  if (!city) {
    var keys = Object.keys(CITY_DB);
    var match = keys.find(function(k) { return k.indexOf(cityName) >= 0 || cityName.indexOf(k) >= 0; });
    if (match) { city = CITY_DB[match]; cityName = match; }
    else { toast('暂不支持该城市，已支持：' + keys.join('、')); return; }
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('planContent').style.display = 'none';
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('loadingText').textContent = '正在获取' + cityName + '天气…';

  fetchWeather(city.center[1], city.center[0], startDate, days).then(function(weatherData) {
    document.getElementById('loadingText').textContent = '正在生成行程…';
    var plan = buildPlan(city, cityName, weatherData, style, budget, people, startDate);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('planContent').style.display = 'block';
    document.getElementById('legend').style.display = 'block';
    renderPlan(plan);
    renderAllDaysOnMap(plan);
    toast('计划生成完成！点击路段可在高德地图查看导航路线');
  }).catch(function(err) {
    console.error('Weather fetch failed:', err);
    document.getElementById('loadingText').textContent = '天气获取失败，使用默认天气生成…';
    // Fallback: generate with dummy weather
    var dummyWeather = [];
    for (var i = 0; i < days; i++) {
      var d = new Date(startDate); d.setDate(d.getDate() + i);
      dummyWeather.push({date:d.toISOString().split('T')[0],weatherCode:1,weatherDesc:'少云',tempMax:28,tempMin:20,precip:0,isRainy:false});
    }
    var plan = buildPlan(city, cityName, dummyWeather, style, budget, people, startDate);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('planContent').style.display = 'block';
    document.getElementById('legend').style.display = 'block';
    renderPlan(plan);
    renderAllDaysOnMap(plan);
    toast('计划已生成（天气数据离线，使用默认值）');
  });
}

function buildPlan(city, cityName, weatherData, style, budget, people, startDate) {
  var budgetMult = budget === 'luxury' ? 2.5 : budget === 'budget' ? 0.5 : 1;
  var styleCounts = { packed: {views:6,foods:3}, moderate: {views:4,foods:2}, relaxed: {views:3,foods:2} };
  var counts = styleCounts[style] || styleCounts.moderate;

  var days = [];
  for (var d = 0; d < weatherData.length; d++) {
    var w = weatherData[d];
    var date = new Date(startDate); date.setDate(date.getDate() + d);
    var dateStr = (date.getMonth()+1) + '/' + date.getDate();

    // Pick attractions: rainy → prefer indoor, sunny → prefer outdoor
    var spots = city.spots.slice();
    spots.sort(function(a, b) {
      var aScore = (w.isRainy && a.indoor) ? 0 : (!w.isRainy && !a.indoor) ? 0 : 1;
      var bScore = (w.isRainy && b.indoor) ? 0 : (!w.isRainy && !b.indoor) ? 0 : 1;
      return aScore - bScore;
    });

    // Select attractions and foods
    var selectedViews = [];
    var selectedFoods = [];
    var usedNames = {};
    spots.forEach(function(s) {
      if (usedNames[s.name]) return;
      if (s.type === 'view' && selectedViews.length < counts.views) {
        selectedViews.push(s); usedNames[s.name] = true;
      }
      if (s.type === 'food' && selectedFoods.length < counts.foods) {
        selectedFoods.push(s); usedNames[s.name] = true;
      }
    });

    // Build timeline
    var stops = [];
    var segs = [];
    var times = style === 'packed' ? ['08:00','09:00','10:30','12:00','14:00','15:30','17:00','18:30','20:00']
      : style === 'relaxed' ? ['09:00','10:30','12:00','14:30','17:00','19:00']
      : ['08:30','10:00','11:30','12:30','14:30','16:00','18:00','20:00'];

    var ti = 0;
    var segColors = ['#e94560','#5b9bd5','#a080d0','#50d090','#f0a050'];

    // Morning: 2 views
    for (var v = 0; v < Math.min(2, selectedViews.length); v++) {
      stops.push({name:selectedViews[v].name,lat:selectedViews[v].lat,lng:selectedViews[v].lng,
        time:times[ti]||'09:00',icon:'🏞',note:selectedViews[v].desc,type:'view'});
      if (v > 0) segs.push({from:stops.length-2,to:stops.length-1,mode:w.isRainy?'taxi':'walk',
        desc:(w.isRainy?'🚕 打车':'🚶 步行')+' '+(selectedViews[v-1].name)+'→'+selectedViews[v].name});
      ti++;
    }

    // Lunch
    if (selectedFoods.length > 0) {
      stops.push({name:selectedFoods[0].name,lat:selectedFoods[0].lat,lng:selectedFoods[0].lng,
        time:style==='relaxed'?'12:00':'12:00',icon:'🍜',note:selectedFoods[0].desc,type:'food'});
      segs.push({from:stops.length-2,to:stops.length-1,mode:w.isRainy?'taxi':'walk',
        desc:(w.isRainy?'🚕 打车':'🚶 步行')+' 前往午餐'});
      ti++;
    }

    // Afternoon: rest of views
    for (var v2 = 2; v2 < selectedViews.length; v2++) {
      var t = ti < times.length ? times[ti] : '15:00';
      stops.push({name:selectedViews[v2].name,lat:selectedViews[v2].lat,lng:selectedViews[v2].lng,
        time:t,icon:w.isRainy&&selectedViews[v2].indoor?'🏛':'🏞',note:selectedViews[v2].desc,type:'view'});
      segs.push({from:stops.length-2,to:stops.length-1,mode:w.isRainy?'taxi':(style==='packed'?'walk':'metro'),
        desc:(w.isRainy?'🚕 打车':'🚇 地铁')+' '+(stops[stops.length-2].name)+'→'+selectedViews[v2].name});
      ti++;
    }

    // Dinner
    if (selectedFoods.length > 1) {
      stops.push({name:selectedFoods[1].name,lat:selectedFoods[1].lat,lng:selectedFoods[1].lng,
        time:style==='relaxed'?'18:00':'18:00',icon:'🍜',note:selectedFoods[1].desc,type:'food'});
      segs.push({from:stops.length-2,to:stops.length-1,mode:w.isRainy?'taxi':'walk',
        desc:(w.isRainy?'🚕 打车':'🚶 步行')+' 前往晚餐'});
    }

    days.push({
      dateStr: dateStr, weather: w, stops: stops, segments: segs,
      color: segColors[d % segColors.length],
      label: 'Day ' + (d+1) + ' · ' + dateStr + ' · ' + w.weatherDesc.split(' ')[1],
    });
  }

  // Budget estimate
  var dailyBase = budget === 'luxury' ? 500 : budget === 'budget' ? 150 : 280;
  var totalBudget = dailyBase * weatherData.length * people;

  return {
    cityName: cityName, days: days, city: city,
    budget: { daily: dailyBase, total: totalBudget, perPerson: totalBudget / people, people: people },
    startDate: startDate,
  };
}

var planRenderData = null;

function renderPlan(plan) {
  planRenderData = plan;
  var panel = document.getElementById('planContent');
  var html = '<div class="plan-title">' + plan.cityName + ' — ' + plan.days.length + '日行程</div>';
  html += '<div class="plan-subtitle">' + plan.startDate.toISOString().split('T')[0] + ' 出发 · '
    + plan.budget.people + '人 · 预估¥' + plan.budget.total + '（人均¥' + plan.budget.perPerson + '/日）</div>';

  // Weather bar
  html += '<div class="weather-bar">';
  plan.days.forEach(function(day) {
    html += '<div class="w-chip"><span class="w-date">' + day.dateStr + '</span> '
      + '<span class="w-icon">' + day.weather.weatherDesc.split(' ')[0] + '</span> '
      + '<span class="w-desc">' + day.weather.weatherDesc.split(' ')[1] + '</span> '
      + day.weather.tempMin + '~' + day.weather.tempMax + '°C</div>';
  });
  html += '</div>';

  // Day cards
  plan.days.forEach(function(day, dayIdx) {
    var colorClass = 's' + dayIdx;
    html += '<div class="day-card"><div class="day-hd" onclick="switchMapDay(' + dayIdx + ')">';
    html += '<span class="day-dot d' + dayIdx + '"></span>' + day.label;
    html += '<span class="day-weather">' + day.weather.tempMin + '~' + day.weather.tempMax + '°C '
      + (day.weather.isRainy ? '🌧' : '☀️') + '</span>';
    html += '<span style="margin-left:4px;font-size:10px;color:#667;">点击→地图</span></div>';

    day.stops.forEach(function(stop, idx) {
      html += '<div class="stop-row" onclick="focusStop(' + dayIdx + ',' + idx + ')">';
      html += '<span class="stop-num ' + colorClass + '">' + (idx+1) + '</span>';
      html += '<div class="stop-info"><div class="s-name">' + stop.icon + ' ' + stop.name + '</div>';
      html += '<div class="s-note">' + stop.note + '</div></div>';
      html += '<span style="font-size:11px;color:#e94560;">' + stop.time + '</span></div>';

      var seg = null;
      for (var s = 0; s < day.segments.length; s++) {
        if (day.segments[s].from === idx) { seg = day.segments[s]; break; }
      }
      if (seg && day.stops[seg.to]) {
        html += '<a class="seg-link" href="javascript:void(0)" onclick="navSegment(' + dayIdx + ',' + seg.from + ',' + seg.to + ',\'' + seg.mode + '\')">';
        html += '<span class="seg-mode ' + seg.mode + '">' + (seg.mode==='walk'?'🚶 步行':seg.mode==='taxi'?'🚕 打车':seg.mode==='metro'?'🚇 地铁':'🚂 火车') + '</span>';
        html += '<span class="seg-desc">' + seg.desc + '</span>';
        html += '<span style="margin-left:auto;font-size:10px;color:#e94560;">🔗 导航 →</span></a>';
      }
    });
    html += '</div>';
  });

  // Budget breakdown
  html += '<div class="day-card"><div class="day-hd">💰 预算估算</div>';
  html += '<div class="budget-bar">';
  html += '🏨 住宿：¥' + (plan.budget.daily*0.35).toFixed(0) + '/天 &nbsp;';
  html += '🍜 餐饮：¥' + (plan.budget.daily*0.3).toFixed(0) + '/天 &nbsp;';
  html += '🚇 交通：¥' + (plan.budget.daily*0.15).toFixed(0) + '/天 &nbsp;';
  html += '🎫 门票：¥' + (plan.budget.daily*0.2).toFixed(0) + '/天<br>';
  html += '<b>合计：¥' + plan.budget.total + '（' + plan.budget.people + '人 × ' + plan.days.length + '天）</b>';
  html += '</div></div>';

  panel.innerHTML = html;
}

function makeMarkerHTML(num, color) {
  return '<div style="background:'+color+';color:white;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);">'+num+'</div>';
}

var dayColors = ['#e94560','#5b9bd5','#a080d0','#50d090','#f0a050'];
var dayCss = ['d0','d1','d2','d3','d4'];

function renderAllDaysOnMap(plan) {
  if (!map || !plan) return;
  // Clear all
  Object.keys(mapMarkers).forEach(function(k){mapMarkers[k].forEach(function(m){try{m.setMap(null)}catch(e){}})});
  Object.keys(mapLines).forEach(function(k){mapLines[k].forEach(function(p){try{p.setMap(null)}catch(e){}})});
  mapMarkers = {}; mapLines = {};

  currentMapDay = 0;
  switchMapDay(0);
}

function switchMapDay(dayIdx) {
  if (!map || !planRenderData) return;
  if (dayIdx >= planRenderData.days.length) return;
  currentMapDay = dayIdx;
  var day = planRenderData.days[dayIdx];
  var color = dayColors[dayIdx];

  // Hide all, then show selected day
  Object.keys(mapMarkers).forEach(function(k){mapMarkers[k].forEach(function(m){try{m.setMap(null)}catch(e){}})});
  Object.keys(mapLines).forEach(function(k){mapLines[k].forEach(function(p){try{p.setMap(null)}catch(e){}})});

  map.setZoomAndCenter(planRenderData.city.zoom || 14, planRenderData.city.center);

  var markers = [];
  day.stops.forEach(function(stop, idx) {
    var pos = [stop.lng, stop.lat];
    var m = new AMap.Marker({position:pos,content:makeMarkerHTML(idx+1,color),anchor:'center',zIndex:100,map:map});
    (function(p,s){m.on('click',function(){infoWin.setContent('<div style="font-family:Microsoft YaHei;font-size:13px;line-height:1.6;color:#1a1a2e;background:#f8f8f8;padding:10px 14px;border-radius:8px;"><b style="color:#c23152;">'+s.icon+' '+s.name+'</b><br><span style="color:#555;">🕐'+s.time+'</span><br><span style="color:#333;">'+s.note+'</span></div>');infoWin.open(map,p);});})(pos,stop);
    markers.push(m);
  });
  mapMarkers[dayIdx] = markers;

  // Connection lines
  var lines = [];
  for (var i = 1; i < day.stops.length; i++) {
    var fromPos = [day.stops[i-1].lng, day.stops[i-1].lat];
    var toPos = [day.stops[i].lng, day.stops[i].lat];
    var poly = new AMap.Polyline({path:[fromPos,toPos],strokeColor:color,strokeWeight:2,strokeOpacity:.35,strokeStyle:'dashed',strokeDasharray:[6,4],map:map,zIndex:40});
    lines.push(poly);
  }
  mapLines[dayIdx] = lines;
}

function focusStop(dayIdx, stopIdx) {
  switchMapDay(dayIdx);
  var markers = mapMarkers[dayIdx];
  if (markers && markers[stopIdx]) {
    var pos = markers[stopIdx].getPosition();
    map.setZoomAndCenter(Math.max(map.getZoom(),15), pos);
    setTimeout(function(){markers[stopIdx].emit('click');},200);
  }
}

function navSegment(dayIdx, fromIdx, toIdx, mode) {
  if (!planRenderData) return;
  var day = planRenderData.days[dayIdx];
  var fromStop = day.stops[fromIdx];
  var toStop = day.stops[toIdx];
  if (!fromStop || !toStop) return;
  var modeMap = {walk:'walking',taxi:'driving',metro:'transit',train:'driving'};
  var amapMode = modeMap[mode] || 'driving';
  var url = 'https://uri.amap.com/navigation?from='+fromStop.lng+','+fromStop.lat+','+encodeURIComponent(fromStop.name)
    +'&to='+toStop.lng+','+toStop.lat+','+encodeURIComponent(toStop.name)+'&mode='+amapMode;
  window.open(url, '_blank');
}

  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
